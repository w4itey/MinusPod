# Standalone whisper.cpp server for remote transcription.
#
# Downloads the model and starts an OpenAI-compatible transcription server
# that MinusPod can use as a whisper backend.
#
# Quick start:
#   1. Download the model:
#      git clone --depth 1 https://github.com/ggml-org/whisper.cpp
#      bash whisper.cpp/models/download-ggml-model.sh large-v3-turbo
#      mkdir -p models && mv whisper.cpp/models/ggml-large-v3-turbo.bin models/
#
#   2. Start the server:
#      docker compose -f docker-compose.whisper.yml up -d
#
#   3. Configure MinusPod (.env or docker-compose.yml):
#      WHISPER_BACKEND=openai-api
#      WHISPER_API_BASE_URL=http://whisper-server:8765/v1
#      WHISPER_DEVICE=cpu
#
# The `whisper-server` hostname resolves only when both stacks share
# a Docker network. Either merge this service into your main
# docker-compose.yml, or run both with the same explicit network
# (e.g. `docker network create minuspod-net`, then add
# `networks: [minuspod-net]` to both services, with `networks:
# minuspod-net: external: true` at the bottom of each file).
#
# The server listens on port 8765 with word-level timestamps (--dtw) for
# precise ad boundary detection. MinusPod sends preprocessed 16kHz mono WAV,
# so --convert is not needed.

services:
  whisper-server:
    image: ghcr.io/ggml-org/whisper.cpp:main-cuda
    platform: linux/amd64
    container_name: whisper-server
    ports:
      - "8765:8765"
    volumes:
      - ./models:/models
    # NOTE: command must be a single-element list because the image's
    # ENTRYPOINT is ["bash", "-c"]. A plain string gets wrapped in
    # /bin/sh -c, breaking argument passing.
    working_dir: /tmp
    command:
      - >-
        whisper-server
        --host 0.0.0.0
        --port 8765
        --model /models/ggml-large-v3-turbo.bin
        --inference-path /v1/audio/transcriptions
        --threads 8
        --processors 1
        --dtw large.v3.turbo
        --no-flash-attn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache torch CPU wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-torch-cpu-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-torch-cpu-

      - name: Install CPU-only torch (matches Dockerfile 2.6.0)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.6.0 torchaudio==2.6.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install project requirements
        run: pip install -r requirements.txt

      - name: Set up Node 20 (for frontend build that produces static/ui)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (favicon and static asset tests require it)
        working-directory: frontend
        run: npm ci && npm run build

      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (runs tsc then vite build)
        run: npm run build

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements
        run: pip-audit --requirement requirements.txt --strict

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit
        run: npm audit --audit-level=high

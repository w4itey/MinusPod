# =================================================================
# MinusPod with OpenRouter -- LLM provider, no GPU required
# =================================================================
# Pre-configured for OpenRouter as the LLM provider.
# LLM inference runs in the cloud via your OpenRouter API key.
#
# For transcription without a GPU, configure WHISPER_BACKEND=openai-api
# with a compatible provider such as Groq:
#   WHISPER_BACKEND=openai-api
#   WHISPER_API_BASE_URL=https://api.groq.com/openai/v1
#   WHISPER_API_KEY=gsk_your_key_here
#   WHISPER_API_MODEL=whisper-large-v3-turbo
#   WHISPER_DEVICE=cpu
#
# Usage:
#   1. Copy to your server directory
#   2. Set OPENROUTER_API_KEY in your .env file or export it
#   3. docker compose -f docker-compose.openrouter.yml up -d
#
# This configuration does NOT require an NVIDIA GPU when using a
# remote Whisper backend.
# =================================================================

services:
  minuspod:
    image: ttlequals0/minuspod:${MINUSPOD_VERSION:-latest}
    platform: linux/amd64
    # Container ships a non-root `minuspod` user at UID/GID 1000; the
    # entrypoint drops root via gosu after fixing volume ownership on
    # first boot. Override `user:` if your ./data volume is owned by
    # a different host UID.
    # user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # LLM via OpenRouter
      - LLM_PROVIDER=openrouter
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # Server
      - BASE_URL=${BASE_URL:-http://localhost:8000}

      # =================================================================
      # 2.0.0+ Security (recommended overrides)
      # =================================================================
      # Encrypts provider API keys + scheduled DB backups at rest.
      # - MINUSPOD_MASTER_PASSPHRASE=${MINUSPOD_MASTER_PASSPHRASE}

      # SESSION_COOKIE_SECURE defaults to true. Set to false only if
      # this OpenRouter deploy sits behind plain HTTP (rare).
      # - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}

      # Number of trusted proxy hops. 1 when behind Cloudflare /
      # cloudflared / nginx / Traefik. Leaving at 0 behind a proxy
      # breaks login lockout and per-IP rate limits silently.
      - MINUSPOD_TRUSTED_PROXY_COUNT=${MINUSPOD_TRUSTED_PROXY_COUNT:-0}

      # =================================================================
      # Notes for OpenAI-compatible swap
      # =================================================================
      # If you swap LLM_PROVIDER to "openai-compatible", set
      # OPENAI_API_KEY explicitly. The ANTHROPIC_API_KEY fallback
      # was removed in 2.0.0+.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
